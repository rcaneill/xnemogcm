name: Run Python Tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: build (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up latest uv and Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.python-version }}
        activate-environment: true
    - name: Install / build
      run: |
        uv pip install .

  test:
    name: test (ubuntu-latest, ${{ matrix.python-version }}, packages version ${{ matrix.resolution }})
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        resolution: ["highest", "lowest-direct"]
    steps:
    - uses: actions/checkout@v7
    - name: Install uv and Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v8
      with:
        python-version: ${{ matrix.python-version }}
        activate-environment: true
    - name: Install dependencies
      run: |
        uv sync --resolution ${{matrix.resolution}} --no-group docs
    - name: Test with pytest
      run: |
        uv run --no-sync pytest xnemogcm/tests
