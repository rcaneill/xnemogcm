# This is a basic workflow to help you get started with Actions

name: CI-upgrade-dependencies

# Controls when the workflow will run
on:
  schedule:
  # Run every tuesday
  - cron: "0 10 * * tue"

  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  # not needed anymore on every push as it is tested in ci.yml  

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  testupgrade:
    name: pytest with upgrade of all packages
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
        resolution: ["highest"]
    steps:
    - uses: actions/checkout@v7
    - name: Install uv and Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      with:
        python-version: ${{ matrix.python-version }}
        activate-environment: true
    - name: Update system
      run: |
        sudo apt update
        sudo apt upgrade --yes
    - name: Install dependencies
      run: |
        uv sync --resolution ${{matrix.resolution}} --group test
    - name: Test with pytest
      run: |
        uv run --no-sync pytest xnemogcm/test
